<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon War</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to right, #1e3c72, #2a5298);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#game {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 40px;
}

.character {
  width: 200px;
  height: 200px;
  border-radius: 20px;
}

#dragon {
  background: linear-gradient(45deg, #ff4e50, #fc913a);
  box-shadow: 0 0 25px orange;
}

#enemy {
  background: linear-gradient(45deg, #434343, #000000);
  box-shadow: 0 0 25px red;
  cursor: pointer;
}

.ui {
  position: absolute;
  top: 10px;
  left: 20px;
}

button {
  padding: 8px 15px;
  font-size: 14px;
  margin-top: 5px;
  cursor: pointer;
}

.hp-container {
  width: 200px;
  height: 20px;
  background: #550000;
  margin-top: 5px;
}

.hp-bar {
  height: 100%;
  background: red;
  width: 100%;
}

.damage {
  position: absolute;
  color: yellow;
  font-weight: bold;
  animation: floatUp 0.8s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}
</style>
</head>

<body>

<div class="ui">
  <div>Coins: <span id="coins">0</span></div>
  <div>Level: <span id="level">1</span></div>

  <div>Enemy HP:</div>
  <div class="hp-container">
    <div class="hp-bar" id="enemyHP"></div>
  </div>

  <div>Hatch Timer: <span id="timer">120</span>s</div>
  <button onclick="speedUp()">Speed Up (-10s)</button>
  <button onclick="watchAd()">Watch Ad (2x Coins 10s)</button>
</div>

<div id="game">
  <div id="dragon" class="character"></div>
  <div id="enemy" class="character"></div>
</div>

<script>
let coins = localStorage.getItem("coins") ? parseInt(localStorage.getItem("coins")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let baseHP = 100;
let enemyHP = baseHP;
let timer = 120;
let doubleCoins = false;

const hpBar = document.getElementById("enemyHP");
const coinText = document.getElementById("coins");
const levelText = document.getElementById("level");
const timerText = document.getElementById("timer");

coinText.innerText = coins;
levelText.innerText = level;

function updateHP() {
  hpBar.style.width = (enemyHP / baseHP) * 100 + "%";
}

function spawnEnemy() {
  baseHP = 100 + (level - 1) * 25;
  enemyHP = baseHP;
  updateHP();
}

document.getElementById("enemy").onclick = function(e) {
  let damage = 10 + level * 2;
  enemyHP -= damage;

  // Flash
  const enemy = document.getElementById("enemy");
  enemy.style.opacity = "0.5";
  setTimeout(() => enemy.style.opacity = "1", 100);

  // Damage number
  const dmg = document.createElement("div");
  dmg.className = "damage";
  dmg.innerText = "-" + damage;
  dmg.style.left = e.pageX + "px";
  dmg.style.top = e.pageY + "px";
  document.body.appendChild(dmg);
  setTimeout(() => dmg.remove(), 800);

  if (enemyHP <= 0) {
    let reward = 10 * level;
    if (doubleCoins) reward *= 2;

    coins += reward;
    level++;

    localStorage.setItem("coins", coins);
    localStorage.setItem("level", level);

    coinText.innerText = coins;
    levelText.innerText = level;

    spawnEnemy();
  }

  updateHP();
}

function speedUp() {
  if (timer > 0) {
    timer -= 10;
    if (timer < 0) timer = 0;
    timerText.innerText = timer;
  }
}

function watchAd() {
  doubleCoins = true;
  alert("2x Coins Activated for 10 seconds!");
  setTimeout(() => doubleCoins = false, 10000);
}

setInterval(function() {
  if (timer > 0) {
    timer--;
    timerText.innerText = timer;
  }
}, 1000);

spawnEnemy();
</script>

</body>
</html>
