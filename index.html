<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon War</title>
<style>
body {
  margin: 0;
  background: linear-gradient(to right, #1e3c72, #2a5298);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#game {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 40px;
}

.character {
  width: 200px;
  height: 200px;
  background-size: cover;
}

#dragon {
  background: linear-gradient(45deg, #ff4e50, #fc913a);
  border-radius: 20px;
  box-shadow: 0 0 20px orange;
}

#enemy {
  background: linear-gradient(45deg, #434343, #000000);
  border-radius: 20px;
  box-shadow: 0 0 20px red;
}

.ui {
  position: absolute;
  top: 10px;
  left: 20px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
}

.hp-bar {
  width: 200px;
  height: 20px;
  background: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="ui">
  <div>Coins: <span id="coins">0</span></div>
  <div>Enemy HP:</div>
  <div class="hp-bar" id="enemyHP"></div>
  <div>Hatch Timer: <span id="timer">120</span>s</div>
  <button onclick="speedUp()">Speed Up (-10s)</button>
</div>

<div id="game">
  <div id="dragon" class="character"></div>
  <div id="enemy" class="character"></div>
</div>

<script>
let coins = 0;
let enemyHP = 100;
let timer = 120;

const hpBar = document.getElementById("enemyHP");
const coinText = document.getElementById("coins");
const timerText = document.getElementById("timer");

function updateHP() {
  hpBar.style.width = enemyHP * 2 + "px";
}

document.getElementById("enemy").onclick = function() {
  enemyHP -= 10;
  if (enemyHP <= 0) {
    coins += 10;
    enemyHP = 100;
  }
  updateHP();
  coinText.innerText = coins;
}

function speedUp() {
  if (timer > 0) {
    timer -= 10;
    if (timer < 0) timer = 0;
    timerText.innerText = timer;
  }
}

setInterval(function() {
  if (timer > 0) {
    timer--;
    timerText.innerText = timer;
  }
}, 1000);

updateHP();
</script>

</body>
</html>
